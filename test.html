<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Page</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
    h1 { color: #333; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 6px; border: 1px solid #ccc; background: #f5f5f5; }
    button:hover { background: #e0e0e0; }
    #output { margin-top: 24px; font-size: 18px; color: #555; }
  </style>
</head>
<body>
  <h1>It works.</h1>
  <button onclick="document.getElementById('output').textContent = 'Hello, BenBen! ' + new Date().toLocaleTimeString()">Click me</button>
  <div id="output"></div>
</body>
</html>
